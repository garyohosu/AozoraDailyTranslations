name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # 静的サイトファイルが変わった時だけデプロイ
      - "index.html"
      - "works/**"
      - "authors/**"
      - "assets/**"
      - "sitemap.xml"
      - "robots.txt"
      - ".nojekyll"
  # 手動トリガー（テスト・緊急デプロイ用）
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1件まで (openClaw との二重 push 防止)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site directory
        run: |
          mkdir -p _site
          # 静的サイトファイルのみをコピー（ソースコード・ドキュメントは除外）
          cp .nojekyll _site/
          [ -f index.html ]   && cp index.html _site/   || true
          [ -f sitemap.xml ]  && cp sitemap.xml _site/  || true
          [ -f robots.txt ]   && cp robots.txt _site/   || true
          [ -d works ]        && cp -r works _site/      || true
          [ -d authors ]      && cp -r authors _site/    || true
          [ -d assets ]       && cp -r assets _site/     || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
